
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'Bookerly';
            src: url('fonts/bookerly/Bookerly.ttf');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Bookerly';
            src: url('fonts/bookerly/Bookerly%20Italic.ttf');
            font-weight: normal;
            font-style: italic;
        }
        @font-face {
            font-family: 'Bookerly';
            src: url('fonts/bookerly/Bookerly%20Bold.ttf');
            font-weight: bold;
            font-style: normal;
        }
        @font-face {
            font-family: 'Bookerly';
            src: url('fonts/bookerly/Bookerly%20Bold%20Italic.ttf');
            font-weight: bold;
            font-style: italic;
        }
        @font-face {
            font-family: 'JetBrains Mono';
            src: url('fonts/jetbrains-mono/JetbrainsMonoRegular-RpvmM.ttf');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'JetBrains Mono';
            src: url('fonts/jetbrains-mono/JetbrainsMonoItalic-lg91X.ttf');
            font-weight: normal;
            font-style: italic;
        }
        @font-face {
            font-family: 'JetBrains Mono';
            src: url('fonts/jetbrains-mono/JetbrainsMonoBold-51Xez.ttf');
            font-weight: bold;
            font-style: normal;
        }
        @font-face {
            font-family: 'JetBrains Mono';
            src: url('fonts/jetbrains-mono/JetbrainsMonoBoldItalic-6YyW6.ttf');
            font-weight: bold;
            font-style: italic;
        }

        @page {
            size: 1620px 2160px; /* reMarkable Paper Pro aspect ratio */
            margin: 80px;
        }
        body {
            font-family: 'Bookerly', serif;
            font-size: 20px;
            line-height: 1.6;
            color: #111;
        }
        .section {
            page-break-before: always;
        }
        .breadcrumbs {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        .breadcrumbs a {
            color: #666;
            text-decoration: none;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 20px auto;
        }
        h1, h2, h3, h4, h5, h6 {
            font-weight: bold;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
        h1 { font-size: 36px; margin-top: 0; }
        h2 { font-size: 30px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        h3 { font-size: 26px; }
        h4 { font-size: 22px; }

        code, pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
            background-color: #f5f5f5;
        }
        pre {
            padding: 15px;
            border-left: 5px solid #ccc;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        code {
            padding: 2px 4px;
        }
        a { color: #004a99; }
    </style>
</head>
<body>
    {% for page in pages %}
    <div class="section" id="{{ page.anchor }}">
        <div class="breadcrumbs">
            {% for crumb in page.breadcrumbs %}
            <a href="#{{ crumb.anchor }}">{{ crumb.title }}</a>
            {% if not loop.last %} / {% endif %}
            {% endfor %}
        </div>
        <h1>{{ page.title }}</h1>
        <div class="content">
            {{ page.content | safe }}
        </div>
    </div>
    {% endfor %}
</body>
</html>
